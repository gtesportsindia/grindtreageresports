<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Tournament Details</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
}

.header{
position:sticky;
top:0;
z-index:100;
background:#111;
padding:15px;
display:flex;
align-items:center;
gap:15px;
border-bottom:1px solid #222;
}

.back-btn{
width:45px;
height:45px;
border-radius:50%;
background:#202020;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.back-btn i{
font-size:18px;
}

.page-title{
font-size:22px;
font-weight:bold;
}

#loading{
height:80vh;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
}

.card{
width:95%;
max-width:850px;
margin:20px auto;
background:#171717;
border-radius:18px;
overflow:hidden;
border:1px solid #2b2b2b;
}

.banner{
width:100%;
height:230px;
object-fit:cover;
}

.content{
padding:20px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin-bottom:12px;
background:#202020;
border-radius:12px;
}

.row span{
color:#aaa;
}

.row b{
color:#fff;
}

.join-btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#ff2f2f;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:18px;
}

.registered-panel{
display:none;
margin-top:20px;
}

.status-box{
padding:15px;
border-radius:12px;
text-align:center;
font-weight:bold;
margin-bottom:15px;
}

.pending{
background:#473600;
color:#ffd54f;
}

.approved{
background:#003d1f;
color:#00ff88;
}

.option-card{
display:flex;
align-items:center;
gap:15px;
padding:16px;
background:#202020;
border-radius:12px;
margin-top:12px;
cursor:pointer;
transition:.3s;
}

.option-card:hover{
background:#292929;
}

.option-card i{
width:30px;
font-size:22px;
color:#ff3c3c;
}

.option-card h3{
font-size:17px;
margin-bottom:4px;
}

.option-card p{
font-size:14px;
color:#bbb;
}

</style>

</head>

<body>

<div class="header">

<div class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</div>

<div class="page-title">
Tournament Details
</div>

</div>

<div id="loading">
Loading Tournament...
</div>

<div id="tournamentDetails"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get,
set,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyAxxvbQlbvqtedhoicrijzAlljIjKeejWw",
authDomain:"grind-treager.firebaseapp.com",
databaseURL:"https://grind-treager-default-rtdb.firebaseio.com",
projectId:"grind-treager",
storageBucket:"grind-treager.firebasestorage.app",
messagingSenderId:"236334920342",
appId:"1:236334920342:web:5ae959f81b41541f5608b7"
};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const auth=getAuth(app);

const id=new URLSearchParams(location.search).get("id");

const loading=document.getElementById("loading");

const container=document.getElementById("tournamentDetails");

const snap=await get(ref(db,"tournaments/"+id));

loading.style.display="none";

if(!snap.exists()){

container.innerHTML=`

<div class="card">

<div class="content">

<h2 style="text-align:center">
Tournament Not Found
</h2>

</div>

</div>

`;

throw new Error("Tournament Not Found");

}

const t=snap.val();

container.innerHTML=`

<div class="card">

<img src="${t.banner}" class="banner">

<div class="content">

<div class="title">
${t.name}
</div>

<div class="row">
<span>Game</span>
<b>${t.game}</b>
</div>

<div class="row">
<span>Prize Pool</span>
<b>${t.prize} GTC</b>
</div>

<div class="row">
<span>Entry Fee</span>
<b>${t.entry} GTC</b>
</div>

<div class="row">
<span>Total Slots</span>
<b>${t.slots} Teams</b>
</div>

<div class="row">
<span>Date</span>
<b>${t.date}</b>
</div>

<div class="row">
<span>Status</span>
<b>${t.status}</b>
</div>

<button id="joinBtn" class="join-btn">
JOIN TOURNAMENT
</button>

<div id="registeredPanel" class="registered-panel">
</div>

</div>

</div>

`;

const joinBtn=document.getElementById("joinBtn");

const panel=document.getElementById("registeredPanel");
onAuthStateChanged(auth, async(user)=>{

if(!user) return;

const profileRef=ref(db,"users/"+user.uid+"/teamProfile");

const profileSnap=await get(profileRef);

if(!profileSnap.exists()) return;

const profile=profileSnap.val();

const regRef=ref(db,"registrations/"+id+"/"+user.uid);

const regSnap=await get(regRef);

if(regSnap.exists()){

joinBtn.style.display="none";
panel.style.display="block";

return;

}

joinBtn.onclick=async()=>{

const latestSnap=await get(profileRef);

const latest=latestSnap.val();

const balance=Number(latest.gtcCoin||0);

const entry=Number(t.entry||0);

if(balance<entry){

alert("Not enough GTC Coin");

return;

}

await update(profileRef,{
gtcCoin:balance-entry
});

await set(regRef,{
uid:user.uid,
teamName:latest.teamName||"",
captain:latest.captain||"",
status:"pending",
coinsPaid:entry,
joinedAt:Date.now()
});

alert("Tournament Joined Successfully");

location.reload();

};

});
onAuthStateChanged(auth, async(user)=>{

if(!user) return;

const regRef=ref(db,"registrations/"+id+"/"+user.uid);

const regSnap=await get(regRef);

if(!regSnap.exists()) return;

const reg=regSnap.val();

joinBtn.style.display="none";
panel.style.display="block";

if(reg.status=="pending"){

panel.innerHTML=`

<div class="status-box pending">

<i class="fa-solid fa-hourglass-half"></i>

Pending Admin Approval

</div>

`;

return;

}

if(reg.status=="approved"){

panel.innerHTML=`

<div class="status-box approved">

<i class="fa-solid fa-circle-check"></i>

Already Registered

</div>

<div class="option-card" id="dateCard">

<i class="fa-solid fa-calendar-days"></i>

<div>

<h3>Tournament Date</h3>

<p>${t.date}</p>

</div>

</div>

<div class="option-card" id="slotCard">

<i class="fa-solid fa-list"></i>

<div>

<h3>Slot List</h3>

<p>Open Slot List</p>

</div>

</div>

<div class="option-card" id="roomCard">

<i class="fa-solid fa-key"></i>

<div>

<h3>Room ID & Password</h3>

<p>View Room Details</p>

</div>

</div>

<div class="option-card" id="pointCard">

<i class="fa-solid fa-ranking-star"></i>

<div>

<h3>Points Table</h3>

<p>Open Points Table</p>

</div>

</div>

<div class="option-card">

<i class="fa-solid fa-trophy"></i>

<div>

<h3>Current Round</h3>

<p>${t.currentRound || "Not Started"}</p>

</div>

</div>

`;

document.getElementById("slotCard").onclick=()=>{

if(!t.slotList){

alert("Slot List Not Available");

return;

}

window.open(t.slotList,"_blank");

};

document.getElementById("pointCard").onclick=()=>{

if(!t.pointTable){

alert("Points Table Not Available");

return;

}

window.open(t.pointTable,"_blank");

};

document.getElementById("roomCard").onclick=()=>{

if(!t.roomId){

alert("Room Details Not Released");

return;

}

alert(
"Room ID : "+t.roomId+
"\n\nPassword : "+t.roomPassword
);

};

}

});
</script>

</body>

</html>
