<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Road To Trophy</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#050505;
color:#fff;
overflow-x:hidden;
}

.hero{
padding:30px 20px;
text-align:center;
}

.hero h1{
font-family:Orbitron;
font-size:38px;
color:#a855f7;
}

.hero p{
color:#aaa;
margin-top:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:20px;
}

.card{
background:#0b0b0b;
border:1px solid #222;
border-radius:20px;
padding:20px;
text-align:center;
}

.card h2{
color:#a855f7;
}

.rank-box{
margin:20px;
background:#0b0b0b;
border:1px solid #222;
border-radius:20px;
padding:20px;
}

.rank-box h2{
font-family:Orbitron;
margin-bottom:15px;
}

.rank-table{
width:100%;
border-collapse:collapse;
}

.rank-table th,
.rank-table td{
padding:12px;
border-bottom:1px solid #222;
text-align:center;
}

.rank-table th{
color:#a855f7;
}

.youtube-section{
margin-top:30px;
overflow:hidden;
}

.youtube-title{
text-align:center;
font-family:Orbitron;
margin-bottom:20px;
}

.video-track{
display:flex;
gap:15px;
width:max-content;
animation:slide 20s linear infinite;
}

.video-card{
width:320px;
height:180px;
border-radius:18px;
overflow:hidden;
border:1px solid #222;
}

.video-card iframe{
width:100%;
height:100%;
}

@keyframes slide{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-50%);
}
}

.channel-btn{
display:inline-block;
padding:12px 24px;
border-radius:50px;
text-decoration:none;
font-weight:700;
letter-spacing:1px;
color:#fff;
background:linear-gradient(135deg,#a855f7,#7c3aed);
box-shadow:0 0 20px rgba(168,85,247,.4);
transition:.3s;
font-size:14px;
}

.channel-wrapper{
text-align:center;
margin-top:20px;
margin-bottom:40px; /* videos se gap */
}

</style>
</head>
<body>

<div class="hero">
<h1>ROAD TO TROPHY</h1>
<p>Track Rankings, Progress & Championship Journey</p>
</div>

<div class="stats">

<div class="card">
<h2>150+</h2>
<p>Teams</p>
</div>

<div class="card">
<h2>25</h2>
<p>Matches</p>
</div>

<div class="card">
<h2>₹5000</h2>
<p>Prize Pool</p>
</div>

</div>

<div class="rank-box">

<h2>LIVE RANKINGS</h2>

<table class="rank-table">

<tr>
<th>#</th>
<th>Team</th>
<th>Points</th>
</tr>

<tr>
<td>1</td>
<td>GT ESPORTS</td>
<td>125</td>
</tr>

<tr>
<td>2</td>
<td>T9Z ESPORTS</td>
<td>118</td>
</tr>

<tr>
<td>3</td>
<td>GOAT ESPORTS</td>
<td>112</td>
</tr>

</table>

</div>

<div class="youtube-section">

<h2 class="youtube-title">
WATCH LIVE ACTIONS
</h2>

<div class="channel-wrapper">

<a href="https://youtube.com/@gt_esports_india_official"
target="_blank"
class="channel-btn">

EXPLORE CHANNEL

</a>

</div>

<div class="video-track">

<div class="video-card">
<iframe src="https://www.youtube.com/embed/LjbtKOry8YI" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/V9wi99QQDKQ" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/J29xo23WRPY" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/XPK1Dx_QLEI" allowfullscreen></iframe>
</div>

<!-- Duplicate for smooth infinite scroll -->

<div class="video-card">
<iframe src="https://www.youtube.com/embed/LjbtKOry8YI" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/V9wi99QQDKQ" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/J29xo23WRPY" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe src="https://www.youtube.com/embed/XPK1Dx_QLEI" allowfullscreen></iframe>
</div>

</div>
</div>

</div>

</body>
</html>
