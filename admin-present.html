<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GT ADMIN PANEL</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07090F;
color:#fff;
}

/* AUTH */

#authScreen{
position:fixed;
inset:0;
background:#07090F;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.auth-box{
width:360px;
background:#111827;
border-radius:18px;
padding:30px;
text-align:center;
}

.auth-box h1{
color:#246BFF;
margin-bottom:10px;
}

.auth-box p{
color:#aaa;
margin-bottom:20px;
}

.auth-box input{
width:100%;
height:50px;
border:none;
outline:none;
background:#1B2332;
color:#fff;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.auth-box button{
width:100%;
height:50px;
border:none;
background:#246BFF;
color:#fff;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:240px;
background:#111827;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#246BFF;
margin-bottom:30px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#fff;
padding:14px;
margin-bottom:10px;
border-radius:12px;
}

.menu a:hover{
background:#246BFF;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
}

.card h2{
font-size:30px;
margin-top:10px;
color:#246BFF;
}

.section{
margin-top:30px;
background:#111827;
border-radius:16px;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #222;
}

.approve{
background:#00b894;
border:none;
padding:8px 14px;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.reject{
background:#ff3b30;
border:none;
padding:8px 14px;
color:#fff;
border-radius:8px;
cursor:pointer;
}

</style>

</head>
<body>

<div id="authScreen">

<div class="auth-box">

<h1>ENTER PASWORD</h1>

<p>ADMIN AUTH</p>

<input
type="password"
id="adminKey"
placeholder="Enter Access Key">

<button onclick="checkAuth()">
VERIFY
</button>

</div>

</div>

<div id="panel" style="display:none;">

<div class="sidebar">

<div class="logo">
GT ADMIN
</div>

<div class="menu">

<a href="#">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="#">
<i class="fa-solid fa-money-bill"></i>
Deposit
</a>

<a href="#">
<i class="fa-solid fa-wallet"></i>
Withdraw
</a>

<a href="#">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="#">
<i class="fa-solid fa-bell"></i>
Notifications
</a>

<a href="#">
<i class="fa-solid fa-gear"></i>
Settings
</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>Dashboard</h1>

<h3>GTDRAYX</h3>

</div>

<div class="cards">

<div class="card">
Total Deposit
<h2 id="totalDeposit">₹0</h2>
</div>

<div class="card">
Total Withdraw
<h2 id="totalWithdraw">₹0</h2>
</div>

<div class="card">
Pending Deposit
<h2 id="pendingDeposit">0</h2>
</div>

<div class="card">
Pending Withdraw
<h2 id="pendingWithdraw">0</h2>
</div>

</div>

<div class="section">

<h2>Deposit Requests</h2>

<table>

<thead>

<tr>

<th>Team</th>

<th>GTC</th>

<th>₹</th>

<th>UTR</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="depositTable">

</tbody>

</table>

</div>

<div class="section">

<h2>Withdrawal Requests</h2>

<table>

<thead>

<tr>

<th>Team</th>

<th>GTC</th>

<th>₹</th>

<th>UPI</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="withdrawTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get,
set,
update,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxxvbQlbvqtedhoicrijzAlljIjKeejWw",
  authDomain: "grind-treager.firebaseapp.com",
  databaseURL: "https://grind-treager-default-rtdb.firebaseio.com",
  projectId: "grind-treager",
  storageBucket: "grind-treager.firebasestorage.app",
  messagingSenderId: "236334920342",
  appId: "1:236334920342:web:5ae959f81b41541f5608b7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.checkAuth = function(){

const key=document.getElementById("adminKey").value;

if(key==="GTDRAYX"){

document.getElementById("authScreen").style.display="none";
document.getElementById("panel").style.display="block";

loadDeposits();
loadWithdraws();
loadDashboard();

}else{

alert("Wrong Access Key");

}

}
window.loadDeposits = function(){
  
const depositRef=ref(db,"depositRequests");

onValue(depositRef,(snapshot)=>{

const table=document.getElementById("depositTable");

table.innerHTML="";

snapshot.forEach((child)=>{

const data=child.val();

table.innerHTML+=`

<tr>

<td>${data.teamName}</td>

<td>${data.gtc}</td>

<td>₹${data.amount}</td>

<td>${data.utr}</td>

<td>${data.status}</td>

<td>

<input
type="text"
id="msg_${child.key}"
placeholder="Admin Message"
style="width:140px;padding:6px;border-radius:8px;border:none;">

<br><br>

<button class="approve"
onclick="approveDeposit('${child.key}')">
Approve
</button>

<button class="reject"
onclick="rejectDeposit('${child.key}')">
Reject
</button>

</td>

</tr>

`;

});

});

}
window.approveDeposit = async function(requestId){

const requestSnap = await get(ref(db,"depositRequests/"+requestId));

if(!requestSnap.exists()) return;

const data = requestSnap.val();
if(data.status !== "Pending"){
    alert("This request has already been processed.");
    return;
}

// Wallet Read
const walletRef = ref(db,"wallets/"+data.uid);

const walletSnap = await get(walletRef);

let balance = 0;

if(walletSnap.exists()){
balance = walletSnap.val().balance || 0;
}

// Wallet Update
await update(walletRef,{
balance: balance + data.gtc
});

// Deposit Status Update
await update(ref(db,"depositRequests/"+requestId),{
status:"Approved"
});

// Notification
const adminMsg =
document.getElementById("msg_"+requestId).value ||
"Payment verified successfully.";

const notifyId = Date.now().toString();

await set(ref(db,"notifications/"+data.uid+"/"+notifyId),{

title:"Deposit Approved",

message:adminMsg,

type:"success",

read:false,

time:Date.now()

});

alert("Deposit Approved");}

window.rejectDeposit = async function(requestId){

const requestSnap = await get(ref(db,"depositRequests/"+requestId));

if(!requestSnap.exists()) return;

const data = requestSnap.val();
if(data.status !== "Pending"){
    alert("This request has already been processed.");
    return;
}
// Status Update
await update(ref(db,"depositRequests/"+requestId),{
status:"Rejected"
});

// Notification
const adminMsg =
document.getElementById("msg_"+requestId).value ||
"Deposit request rejected.";

const notifyId = Date.now().toString();

await set(ref(db,"notifications/"+data.uid+"/"+notifyId),{

title:"Deposit Rejected",

message:adminMsg,

type:"error",

read:false,

time:Date.now()

});

alert("Deposit Rejected");}

window.loadWithdraws = function(){

const withdrawRef = ref(db,"withdrawRequests");

onValue(withdrawRef,(snapshot)=>{

const table = document.getElementById("withdrawTable");

table.innerHTML = "";

snapshot.forEach((child)=>{

const data = child.val();

table.innerHTML += `

<tr>

<td>${data.teamName}</td>

<td>${data.gtc}</td>

<td>₹${data.amount}</td>

<td>${data.upiId}</td>

<td>${data.status}</td>

<td>

<input
type="text"
id="withdrawmsg_${child.key}"
placeholder="Admin Message"
style="width:140px;padding:6px;border-radius:8px;border:none;">

<br><br>

<button class="approve"
onclick="approveWithdraw('${child.key}')">
Approve
</button>

<button class="reject"
onclick="rejectWithdraw('${child.key}')">
Reject
</button>

</td>

</tr>

`;

});

});
}
window.approveWithdraw = async function(requestId){

const requestSnap = await get(ref(db,"withdrawRequests/"+requestId));

if(!requestSnap.exists()) return;

const data = requestSnap.val();
if(data.status !== "Pending"){
    alert("This request has already been processed.");
    return;
}

// Wallet Read
const walletRef = ref(db,"wallets/"+data.uid);

const walletSnap = await get(walletRef);

let balance = 0;

if(walletSnap.exists()){
    balance = walletSnap.val().balance || 0;
}

// Double Check
if(balance < data.gtc){
    alert("User has insufficient balance.");
    return;
}

// Wallet Update
await update(walletRef,{
    balance: balance - data.gtc
});

// Withdraw Status
await update(ref(db,"withdrawRequests/"+requestId),{
    status:"Approved"
});

// Transaction History
const txId = Date.now().toString();

await set(ref(db,"transactions/"+data.uid+"/"+txId),{

    type:"Withdraw",
    gtc:data.gtc,
    amount:data.amount,
    status:"Approved",
    time:Date.now()

});

// Notification
const adminMsg =
    document.getElementById("withdrawmsg_" + requestId).value ||
    "Withdrawal approved.";

const notifyId = Date.now().toString();

await set(ref(db, "notifications/" + data.uid + "/" + notifyId), {
    
    title: "Withdrawal Approved",
    
    message: adminMsg,
    
    type: "success",
    
    read: false,
    
    time: Date.now()
    
});

alert("Withdrawal Approved");
}

window.rejectWithdraw = async function(requestId){

const requestSnap = await get(ref(db,"withdrawRequests/"+requestId));

if(!requestSnap.exists()) return;

const data = requestSnap.val();
if(data.status !== "Pending"){
    alert("This request has already been processed.");
    return;
}
// Status Update
await update(ref(db,"withdrawRequests/"+requestId),{
status:"Rejected"
});

// Transaction History
const txId = Date.now().toString();

await set(ref(db,"transactions/"+data.uid+"/"+txId),{

type:"Withdraw",

gtc:data.gtc,

amount:data.amount,

status:"Rejected",

time:Date.now()

});

// Notification
const adminMsg =
document.getElementById("withdrawmsg_"+requestId).value ||
"Withdrawal rejected.";

const notifyId = Date.now().toString();

await set(ref(db,"notifications/"+data.uid+"/"+notifyId),{

title:"Withdrawal Rejected",

message:adminMsg,

type:"error",

read:false,

time:Date.now()

});

alert("Withdrawal Rejected");
}

window.loadDashboard = function(){

// Deposit
onValue(ref(db,"depositRequests"),(snapshot)=>{

let totalDeposit=0;
let pendingDeposit=0;

snapshot.forEach((child)=>{

const data=child.val();

if(data.status==="Approved"){
totalDeposit+=Number(data.amount);
}

if(data.status==="Pending"){
pendingDeposit++;
}

});

document.getElementById("totalDeposit").textContent="₹"+totalDeposit;
document.getElementById("pendingDeposit").textContent=pendingDeposit;

});

// Withdraw
onValue(ref(db,"withdrawRequests"),(snapshot)=>{

let totalWithdraw=0;
let pendingWithdraw=0;

snapshot.forEach((child)=>{

const data=child.val();

if(data.status==="Approved"){
totalWithdraw+=Number(data.amount);
}

if(data.status==="Pending"){
pendingWithdraw++;
}

});

document.getElementById("totalWithdraw").textContent="₹"+totalWithdraw;
document.getElementById("pendingWithdraw").textContent=pendingWithdraw;

});

}

</script>
</body>
</html>
