async function qualifySelectedTeams(){

const targetRound=document.getElementById("targetRound").value;

const targetGroup=document.getElementById("targetGroup").value;

if(!targetRound||!targetGroup){

alert("Select Target Round & Target Group");

return;

}

const tournament=document.getElementById("qualifyTournament").value;
const currentRound=document.getElementById("qualifyRound").value;


const checked=document.querySelectorAll(".qualifyTeam:checked");

if(checked.length===0){

alert("Select at least one team");
return;

}

for(const team of checked){

const teamKey=team.value;

const teamSnap = await get(
  ref(db, `tournamentEntries/${tournament}/${teamKey}`)
);

if (teamSnap.exists()) {
  
  const teamData = teamSnap.val();
  
  const qualifiedRounds = teamData.qualifiedRounds || {};
qualifiedRounds[targetRound] = true;

const roundGroups = teamData.roundGroups || {};
roundGroups[targetRound] = targetGroup;

await update(
  ref(db, `tournamentEntries/${tournament}/${teamKey}`),
  {
    currentRound: targetRound,
    group: targetGroup,
    status: "Qualified",
    qualifiedRounds,
    roundGroups
  }
);
  
}
}

document.getElementById("qualifyMsg").innerHTML=
`✅ ${checked.length} Team(s) Qualified to ${targetRound} - ${targetGroup}`;

loadRegisteredTeams();

}



document.getElementById("roundPage").onclick=showRoundPage;

document.getElementById("slotPage").onclick=showSlotPage;
document.getElementById("roomPage").onclick=showRoomPage;
document.getElementById("pointPage").onclick=showPointPage;

document.getElementById("qualifyPage").onclick=showQualifyPage;
document.getElementById("schedulePage").onclick=showSchedulePage;
</script>
